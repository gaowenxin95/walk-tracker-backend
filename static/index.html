<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#247a4d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="走路打卡">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>走路打卡</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --surface: #ffffff;
      --ink: #1b1f1d;
      --muted: #66726b;
      --line: #dfe5df;
      --green: #247a4d;
      --green-ink: #ffffff;
      --mint: #dff2e7;
      --coral: #d36c45;
      --amber: #f0b94d;
      --shadow: 0 18px 45px rgba(31, 41, 33, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 28px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 22px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.1;
      letter-spacing: 0;
    }

    .today-date {
      color: var(--muted);
      font-size: 15px;
      margin-top: 8px;
    }

    .status-pill {
      min-width: 104px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
      font-weight: 700;
    }

    .status-pill.done {
      background: var(--mint);
      border-color: #b9dfc8;
      color: var(--green);
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(280px, 0.85fr) minmax(360px, 1.15fr);
      gap: 18px;
      align-items: start;
    }

    .panel,
    .day,
    .metric {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .panel {
      padding: 20px;
    }

    .panel h2 {
      font-size: 18px;
      letter-spacing: 0;
      margin-bottom: 18px;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      background: #fbfcfb;
      color: var(--ink);
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(36, 122, 77, 0.12);
    }

    .estimate {
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-radius: 8px;
      background: #f2f6f1;
      padding: 10px 12px;
      color: var(--muted);
    }

    .estimate strong {
      color: var(--ink);
      font-size: 20px;
    }

    .primary {
      min-height: 48px;
      border: 0;
      border-radius: 8px;
      background: var(--green);
      color: var(--green-ink);
      font-weight: 800;
      cursor: pointer;
    }

    .primary:hover {
      background: #1f6842;
    }

    .primary:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .metric {
      min-height: 94px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: none;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .metric strong {
      font-size: 25px;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .week {
      display: grid;
      gap: 10px;
    }

    .day {
      min-height: 68px;
      display: grid;
      grid-template-columns: 96px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
      box-shadow: none;
    }

    .day.today {
      border-color: #a9d5bb;
      background: #fbfffc;
    }

    .date-block {
      display: grid;
      gap: 4px;
    }

    .weekday {
      font-weight: 800;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
    }

    .bar {
      height: 8px;
      border-radius: 999px;
      background: #edf1ed;
      overflow: hidden;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--coral);
      transition: width 180ms ease;
    }

    .day.done .bar-fill {
      background: var(--green);
    }

    .numbers {
      min-width: 118px;
      text-align: right;
      display: grid;
      gap: 4px;
    }

    .steps {
      font-weight: 800;
    }

    .km {
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      color: var(--muted);
    }

    .message {
      min-height: 20px;
      color: var(--coral);
      font-size: 14px;
      margin-top: 12px;
    }

    @media (max-width: 820px) {
      .app {
        padding: 20px;
      }

      .topbar {
        align-items: flex-start;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .day {
        grid-template-columns: 76px 1fr;
      }

      .numbers {
        grid-column: 1 / -1;
        min-width: 0;
        text-align: left;
        grid-template-columns: repeat(2, max-content);
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>走路打卡</h1>
        <p class="today-date" id="todayDate">--</p>
      </div>
      <div class="status-pill" id="todayStatus">未打卡</div>
    </header>

    <section class="grid">
      <section class="panel">
        <h2>今日记录</h2>
        <form class="form" id="checkInForm">
          <div class="field">
            <label for="stepsInput">步数</label>
            <input id="stepsInput" name="steps" type="number" min="0" step="1" inputmode="numeric" value="8000">
          </div>
          <div class="field">
            <label for="strideInput">步幅（米）</label>
            <input id="strideInput" name="stride" type="number" min="0.1" step="0.01" inputmode="decimal" value="0.7">
          </div>
          <div class="field">
            <label for="noteInput">备注</label>
            <input id="noteInput" name="note" type="text" maxlength="80" placeholder="晚饭后散步">
          </div>
          <div class="estimate">
            <span>预计距离</span>
            <strong id="distancePreview">5.60 km</strong>
          </div>
          <button class="primary" type="submit" id="submitButton">完成今日打卡</button>
        </form>
        <p class="message" id="message"></p>
      </section>

      <section class="panel">
        <h2>过去 7 天</h2>
        <div class="metrics">
          <div class="metric">
            <span>打卡</span>
            <strong id="checkedInDays">0/7</strong>
          </div>
          <div class="metric">
            <span>总步数</span>
            <strong id="totalSteps">0</strong>
          </div>
          <div class="metric">
            <span>总公里</span>
            <strong id="totalKm">0</strong>
          </div>
          <div class="metric">
            <span>连续</span>
            <strong id="streakDays">0 天</strong>
          </div>
        </div>
        <div class="week" id="weekList"></div>
      </section>
    </section>
  </main>

  <script>
    const stepsInput = document.querySelector("#stepsInput");
    const strideInput = document.querySelector("#strideInput");
    const noteInput = document.querySelector("#noteInput");
    const distancePreview = document.querySelector("#distancePreview");
    const form = document.querySelector("#checkInForm");
    const button = document.querySelector("#submitButton");
    const message = document.querySelector("#message");

    const formatNumber = new Intl.NumberFormat("zh-CN");
    const weekday = new Intl.DateTimeFormat("zh-CN", { weekday: "short" });
    const monthDay = new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit" });
    const longDate = new Intl.DateTimeFormat("zh-CN", {
      year: "numeric",
      month: "long",
      day: "numeric",
      weekday: "long"
    });

    function localDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function distanceKm(steps, stride) {
      return (steps * stride / 1000);
    }

    function refreshPreview() {
      const steps = Number(stepsInput.value || 0);
      const stride = Number(strideInput.value || 0.7);
      distancePreview.textContent = `${distanceKm(steps, stride).toFixed(2)} km`;
    }

    async function fetchStats() {
      const response = await fetch("/stats?days=7");
      if (!response.ok) {
        throw new Error("统计数据加载失败");
      }
      return response.json();
    }

    function renderStats(stats) {
      document.querySelector("#checkedInDays").textContent = `${stats.checked_in_days}/7`;
      document.querySelector("#totalSteps").textContent = formatNumber.format(stats.total_steps);
      document.querySelector("#totalKm").textContent = stats.total_distance_km.toFixed(1);
      document.querySelector("#streakDays").textContent = `${stats.streak_days} 天`;

      const today = localDateString(new Date());
      const todayRecord = stats.records.find((record) => record.date === today);
      const status = document.querySelector("#todayStatus");
      status.textContent = todayRecord && todayRecord.checked_in ? "已打卡" : "未打卡";
      status.classList.toggle("done", Boolean(todayRecord && todayRecord.checked_in));

      const maxSteps = Math.max(1, ...stats.records.map((record) => record.steps));
      document.querySelector("#weekList").innerHTML = stats.records.map((record) => {
        const date = new Date(`${record.date}T00:00:00`);
        const percent = Math.min(100, Math.round(record.steps / maxSteps * 100));
        const doneClass = record.checked_in ? "done" : "";
        const todayClass = record.date === today ? "today" : "";
        const stepsText = record.steps > 0 ? `${formatNumber.format(record.steps)} 步` : "未记录";
        const kmText = record.distance_km > 0 ? `${record.distance_km.toFixed(2)} km` : "";

        return `
          <article class="day ${doneClass} ${todayClass}">
            <div class="date-block">
              <div class="weekday">${weekday.format(date)}</div>
              <div class="date">${monthDay.format(date)}</div>
            </div>
            <div class="bar" aria-hidden="true">
              <div class="bar-fill" style="width: ${percent}%"></div>
            </div>
            <div class="numbers">
              <div class="steps ${record.steps ? "" : "empty"}">${stepsText}</div>
              <div class="km">${kmText}</div>
            </div>
          </article>
        `;
      }).join("");
    }

    async function load() {
      message.textContent = "";
      document.querySelector("#todayDate").textContent = longDate.format(new Date());
      try {
        renderStats(await fetchStats());
      } catch (error) {
        message.textContent = error.message;
      }
    }

    stepsInput.addEventListener("input", refreshPreview);
    strideInput.addEventListener("input", refreshPreview);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      message.textContent = "";

      try {
        const response = await fetch("/records/check-in", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            steps: Number(stepsInput.value || 0),
            stride_meters: Number(strideInput.value || 0.7),
            note: noteInput.value.trim() || null
          })
        });
        if (!response.ok) {
          const payload = await response.json();
          throw new Error(payload.error || "打卡失败");
        }
        await load();
      } catch (error) {
        message.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    });

    refreshPreview();
    load();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
