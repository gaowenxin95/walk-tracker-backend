<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10251d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="动迹">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>动迹</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3ef;
      --ink: #111815;
      --muted: #65736b;
      --surface: #ffffff;
      --soft: #f7faf6;
      --line: #dce5de;
      --green: #174d35;
      --lime: #d8fb58;
      --blue: #76c8ee;
      --coral: #ef7d55;
      --gold: #f5c462;
      --shadow: 0 18px 45px rgba(28, 50, 39, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #e7f0ea 0%, #f8f9f4 48%, #eef3ef 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding-bottom: 92px;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    .app {
      width: min(1080px, 100%);
      margin: 0 auto;
      padding: 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--green);
      color: var(--lime);
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(23, 77, 53, 0.2);
    }

    .brand h1 {
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .user-chip {
      min-height: 42px;
      display: none;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      color: var(--green);
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    body.is-authed .user-chip {
      display: inline-flex;
    }

    .screen {
      display: none;
      gap: 16px;
    }

    .screen.active {
      display: grid;
    }

    .hero {
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 16px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--ink);
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 5px 12px;
      background: #eef7ef;
      border: 1px solid #d5e8d9;
      color: var(--green);
      font-size: 13px;
      font-weight: 900;
    }

    .status.done {
      color: var(--green);
      background: #e8f8d7;
      border-color: #cfe8a2;
    }

    .hero h2 {
      margin-top: 12px;
      color: var(--ink);
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .hero-copy {
      color: var(--muted);
      line-height: 1.6;
      margin-top: 8px;
      max-width: 440px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 16px;
    }

    .hero-stat {
      min-height: 70px;
      border-radius: var(--radius);
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 12px;
    }

    .hero-stat span,
    .metric span,
    .mini-card span,
    .profile-summary span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .hero-stat span {
      color: var(--muted);
    }

    .hero-stat strong {
      display: block;
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      margin-top: 8px;
      overflow-wrap: anywhere;
    }

    .hero-visual {
      width: min(100%, 240px);
      max-height: 210px;
      justify-self: end;
      object-fit: contain;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .panel h3 {
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric,
    .mini-card,
    .profile-summary {
      min-height: 92px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 13px;
    }

    .metric strong,
    .mini-card strong,
    .profile-summary strong {
      font-size: 24px;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .week {
      display: grid;
      gap: 10px;
    }

    .day {
      min-height: 76px;
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .day.today {
      border-color: rgba(23, 77, 53, 0.28);
      background: #fbfffb;
    }

    .day-date strong {
      display: block;
      font-size: 15px;
    }

    .day-date span,
    .day-numbers span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .activity-pill {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eef4ef;
      color: var(--green);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .bar {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf1ec;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--coral);
    }

    .day.done .bar-fill {
      background: var(--green);
    }

    .day-numbers {
      min-width: 118px;
      text-align: right;
      display: grid;
      gap: 4px;
    }

    .empty {
      color: #8a9890;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .activity-button {
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      color: var(--ink);
      display: grid;
      gap: 8px;
      place-items: center;
      padding: 10px 6px;
      font-weight: 900;
    }

    .activity-button svg,
    .tab-button svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.4;
    }

    .activity-button[aria-pressed="true"] {
      background: #12281f;
      border-color: #12281f;
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(23, 77, 53, 0.18);
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdfb;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:read-only {
      color: var(--muted);
      background: #f1f5f0;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(23, 77, 53, 0.12);
    }

    .preview-grid,
    .profile-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .primary,
    .ghost-button {
      min-height: 48px;
      border-radius: var(--radius);
      font-weight: 900;
    }

    .primary {
      border: 0;
      background: #111815;
      color: #ffffff;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--muted);
      padding: 0 12px;
    }

    .message,
    .login-message {
      min-height: 20px;
      color: #b85135;
      font-size: 13px;
      font-weight: 900;
    }

    .profile-header {
      display: grid;
      grid-template-columns: 70px 1fr;
      gap: 14px;
      align-items: center;
    }

    .avatar {
      width: 70px;
      height: 70px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #12281f;
      color: var(--lime);
      font-size: 28px;
      font-weight: 900;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 12px;
      z-index: 10;
      width: min(520px, calc(100% - 28px));
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      border: 1px solid rgba(220, 229, 222, 0.92);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 18px 50px rgba(17, 24, 21, 0.18);
      backdrop-filter: blur(14px);
      padding: 8px;
    }

    .tab-button {
      min-height: 58px;
      display: grid;
      place-items: center;
      gap: 3px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .tab-button.active {
      background: #12281f;
      color: #ffffff;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(16, 37, 29, 0.5);
      backdrop-filter: blur(12px);
    }

    body.auth-needed .login-overlay {
      display: flex;
    }

    body.auth-needed .app,
    body.auth-needed .bottom-nav {
      filter: blur(5px);
      pointer-events: none;
      user-select: none;
    }

    .login-card {
      width: min(430px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 28px 80px rgba(17, 24, 21, 0.28);
      padding: 22px;
    }

    .login-card h2 {
      font-size: 28px;
      letter-spacing: 0;
    }

    .login-card p {
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    .login-form {
      display: grid;
      gap: 13px;
      margin-top: 18px;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .captcha-image {
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #f6faf5;
    }

    .captcha-image img {
      display: block;
      width: 100%;
      height: 70px;
      object-fit: cover;
    }

    @media (max-width: 820px) {
      .app {
        padding: 16px;
      }

      .hero {
        grid-template-columns: 1fr;
        padding: 16px;
      }

      .hero h2 {
        font-size: 34px;
        white-space: normal;
      }

      .hero-visual {
        width: min(100%, 260px);
        max-height: 170px;
        justify-self: center;
      }

      .hero-stats {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metrics,
      .activity-grid,
      .profile-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .hero-stats {
        gap: 8px;
      }

      .hero-stat {
        min-height: 64px;
        padding: 10px 8px;
      }

      .hero-stat span {
        font-size: 11px;
      }

      .hero-stat strong {
        font-size: 18px;
      }

      .field-row,
      .preview-grid {
        grid-template-columns: 1fr;
      }

      .day {
        grid-template-columns: 60px 1fr;
      }

      .day-numbers {
        grid-column: 1 / -1;
        min-width: 0;
        text-align: left;
        grid-template-columns: repeat(3, max-content);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>动迹</h1>
          <p class="date" id="todayDate">--</p>
        </div>
      </div>
      <div class="user-chip" id="topUserName">未登录</div>
    </header>

    <section class="screen active" id="screen-calendar">
      <section class="hero">
        <div>
          <div class="status" id="todayStatus">今日未完成</div>
          <h2 id="heroTitle">今天动起来</h2>
          <p class="hero-copy" id="heroCopy">从打卡日历看节奏，保持一点点连续感。</p>
          <div class="hero-stats">
            <div class="hero-stat">
              <span>今日步数</span>
              <strong id="heroSteps">0</strong>
            </div>
            <div class="hero-stat">
              <span>今日距离</span>
              <strong id="heroKm">0.0 km</strong>
            </div>
            <div class="hero-stat">
              <span>连续天数</span>
              <strong id="heroStreak">0</strong>
            </div>
          </div>
        </div>
        <img class="hero-visual" src="/assets/sport-hero.svg" alt="运动训练视觉">
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>打卡日历</h3>
          <span class="panel-sub">过去 7 天</span>
        </div>
        <div class="metrics">
          <div class="metric">
            <span>打卡</span>
            <strong id="checkedInDays">0/7</strong>
          </div>
          <div class="metric">
            <span>总步数</span>
            <strong id="totalSteps">0</strong>
          </div>
          <div class="metric">
            <span>总公里</span>
            <strong id="totalKm">0.0</strong>
          </div>
          <div class="metric">
            <span>总时长</span>
            <strong id="totalMinutes">0m</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>每日记录</h3>
          <span class="panel-sub">日历明细</span>
        </div>
        <div class="week" id="weekList"></div>
      </section>
    </section>

    <section class="screen" id="screen-activities">
      <section class="panel">
        <div class="panel-head">
          <h3>趣味活动</h3>
          <span class="panel-sub" id="selectedActivityText">散步</span>
        </div>
        <div class="activity-grid" id="activityGrid"></div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>今日打卡</h3>
          <span class="panel-sub">选择活动后记录</span>
        </div>
        <form class="form" id="checkInForm">
          <div class="field-row">
            <div class="field">
              <label for="stepsInput">步数 / 次数</label>
              <input id="stepsInput" type="number" min="0" step="1" inputmode="numeric" value="8000">
            </div>
            <div class="field">
              <label for="durationInput">运动时长</label>
              <input id="durationInput" type="number" min="0" step="1" inputmode="numeric" value="45">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="strideInput">步幅（米）</label>
              <input id="strideInput" type="number" min="0.1" step="0.01" inputmode="decimal" value="0.7">
            </div>
            <div class="field">
              <label for="noteInput">备注</label>
              <input id="noteInput" type="text" maxlength="80" placeholder="晚饭后完成">
            </div>
          </div>
          <div class="preview-grid">
            <div class="mini-card">
              <span>预计距离</span>
              <strong id="distancePreview">5.60 km</strong>
            </div>
            <div class="mini-card">
              <span>预计消耗</span>
              <strong id="caloriePreview">165 kcal</strong>
            </div>
            <div class="mini-card">
              <span>活动</span>
              <strong id="activityPreview">散步</strong>
            </div>
          </div>
          <button class="primary" type="submit" id="submitButton">完成今日训练</button>
          <p class="message" id="message"></p>
        </form>
      </section>
    </section>

    <section class="screen" id="screen-profile">
      <section class="panel">
        <div class="profile-header">
          <div class="avatar" id="profileAvatar">M</div>
          <div>
            <h3 id="profileTitle">我的</h3>
            <p class="date" id="profilePhone">--</p>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>身体目标</h3>
          <span class="panel-sub">个人信息</span>
        </div>
        <div class="profile-grid">
          <div class="profile-summary">
            <span>身高</span>
            <strong id="heightSummary">--</strong>
          </div>
          <div class="profile-summary">
            <span>体重</span>
            <strong id="weightSummary">--</strong>
          </div>
          <div class="profile-summary">
            <span>目标体重</span>
            <strong id="targetWeightSummary">--</strong>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>资料设置</h3>
          <span class="panel-sub">手机号登录</span>
        </div>
        <form class="form" id="profileForm">
          <div class="field-row">
            <div class="field">
              <label for="profileNameInput">姓名</label>
              <input id="profileNameInput" type="text" maxlength="30" placeholder="姓名">
            </div>
            <div class="field">
              <label for="profilePhoneInput">手机号</label>
              <input id="profilePhoneInput" type="tel" readonly>
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="heightInput">身高 cm</label>
              <input id="heightInput" type="number" min="1" step="0.1" inputmode="decimal" placeholder="168">
            </div>
            <div class="field">
              <label for="weightInput">当前体重 kg</label>
              <input id="weightInput" type="number" min="1" step="0.1" inputmode="decimal" placeholder="58">
            </div>
          </div>
          <div class="field">
            <label for="targetWeightInput">目标体重 kg</label>
            <input id="targetWeightInput" type="number" min="1" step="0.1" inputmode="decimal" placeholder="55">
          </div>
          <button class="primary" type="submit" id="profileSaveButton">保存资料</button>
          <button class="ghost-button" type="button" id="logoutButton">退出登录</button>
          <p class="message" id="profileMessage"></p>
        </form>
      </section>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="底部导航">
    <button class="tab-button active" type="button" data-tab="calendar">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 4h14v16H5zM8 2v4M16 2v4M5 9h14" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>打卡日历</span>
    </button>
    <button class="tab-button" type="button" data-tab="activities">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 19h5l3-5 4 5h3M7 11l5-4 4 3-2 4M3 8h4M2 12h3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>趣味活动</span>
    </button>
    <button class="tab-button" type="button" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="7" r="4" stroke="currentColor"/><path d="M4 21c1.6-4 4.2-6 8-6s6.4 2 8 6" stroke="currentColor" stroke-linecap="round"/></svg>
      <span>我的</span>
    </button>
  </nav>

  <section class="login-overlay" id="loginOverlay" aria-modal="true" role="dialog">
    <div class="login-card">
      <h2>手机登录</h2>
      <p>输入姓名和手机号，并完成安全图验证后才能访问。</p>
      <form class="login-form" id="loginForm">
        <div class="field-row">
          <div class="field">
            <label for="loginNameInput">姓名</label>
            <input id="loginNameInput" type="text" maxlength="30" autocomplete="name" placeholder="请输入姓名">
          </div>
          <div class="field">
            <label for="loginPhoneInput">手机号</label>
            <input id="loginPhoneInput" type="tel" maxlength="11" inputmode="numeric" autocomplete="tel" placeholder="11 位手机号">
          </div>
        </div>
        <div class="field">
          <label for="captchaAnswerInput">安全图验证</label>
          <div class="captcha-row">
            <div class="captcha-image" id="captchaImage"></div>
            <button class="ghost-button" type="button" id="refreshCaptchaButton">换一张</button>
          </div>
          <input id="captchaAnswerInput" type="text" maxlength="8" autocomplete="off" placeholder="输入图中字符">
        </div>
        <button class="primary" type="submit" id="loginButton">进入动迹</button>
        <p class="login-message" id="loginMessage"></p>
      </form>
    </div>
  </section>

  <script>
    const ACTIVITIES = {
      walk: { label: "散步", cue: "轻松走一段", defaultSteps: 8000, defaultMinutes: 45, stride: 0.7, met: 3.5, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 20l2-5 4-2 1 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 10l4-3 4 2 2 4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="4" r="2" stroke="currentColor"/></svg>' },
      run: { label: "跑步", cue: "把心率拉起来", defaultSteps: 6500, defaultMinutes: 30, stride: 1.05, met: 8.3, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 19h5l3-5 4 5h3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11l5-4 4 3-2 4M3 8h4M2 12h3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="14" cy="4" r="2" stroke="currentColor"/></svg>' },
      swim: { label: "游泳", cue: "低冲击耐力", defaultSteps: 0, defaultMinutes: 40, stride: 0.7, met: 7, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 17c2 0 2-1 4-1s2 1 4 1 2-1 4-1 2 1 4 1 2-1 2-1" stroke="currentColor" stroke-linecap="round"/><path d="M6 12l5-3 4 3 4-1" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="6" r="2" stroke="currentColor"/></svg>' },
      hike: { label: "徒步", cue: "把路线走成风景", defaultSteps: 12000, defaultMinutes: 90, stride: 0.72, met: 6, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M4 18l5-8 4 6 3-4 4 6H4z" stroke="currentColor" stroke-linejoin="round"/><path d="M14 6h4l-2-3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
      climb: { label: "爬山", cue: "一步一坡，慢慢上升", defaultSteps: 9000, defaultMinutes: 80, stride: 0.65, met: 8, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 20l7-14 4 8 3-5 4 11H3z" stroke="currentColor" stroke-linejoin="round"/><path d="M10 6l2 3 2-3" stroke="currentColor" stroke-linecap="round"/></svg>' },
      rope: { label: "跳绳", cue: "短时高燃", defaultSteps: 0, defaultMinutes: 20, stride: 0.7, met: 10, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 18c-3-3-3-9 0-12M17 18c3-3 3-9 0-12M9 9l3 3 3-3M12 12v8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="20" r="1.5" stroke="currentColor"/><circle cx="16" cy="20" r="1.5" stroke="currentColor"/></svg>' },
      cycle: { label: "骑行", cue: "踩出一点速度感", defaultSteps: 0, defaultMinutes: 45, stride: 0.7, met: 7.5, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="6" cy="17" r="3" stroke="currentColor"/><circle cx="18" cy="17" r="3" stroke="currentColor"/><path d="M8 17l4-8 3 8M12 9h4M10 6h3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>' },
      yoga: { label: "瑜伽", cue: "放松也算认真运动", defaultSteps: 0, defaultMinutes: 30, stride: 0.7, met: 2.5, icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="12" cy="5" r="2" stroke="currentColor"/><path d="M12 8v5M6 18l6-5 6 5M7 12h10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/></svg>' }
    };

    const $ = (selector) => document.querySelector(selector);
    const stepsInput = $("#stepsInput");
    const durationInput = $("#durationInput");
    const strideInput = $("#strideInput");
    const noteInput = $("#noteInput");
    const message = $("#message");
    const activityGrid = $("#activityGrid");
    const selectedActivityText = $("#selectedActivityText");
    const loginForm = $("#loginForm");
    const loginNameInput = $("#loginNameInput");
    const loginPhoneInput = $("#loginPhoneInput");
    const captchaAnswerInput = $("#captchaAnswerInput");
    const captchaImage = $("#captchaImage");
    const loginMessage = $("#loginMessage");
    const profileForm = $("#profileForm");
    let selectedActivity = "walk";
    let currentUser = null;
    let captchaId = null;

    const formatNumber = new Intl.NumberFormat("zh-CN");
    const weekday = new Intl.DateTimeFormat("zh-CN", { weekday: "short" });
    const monthDay = new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit" });
    const longDate = new Intl.DateTimeFormat("zh-CN", { month: "long", day: "numeric", weekday: "short" });

    function localDateString(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function distanceKm(steps, stride) {
      return steps * stride / 1000;
    }

    function calories(activityType, minutes) {
      return Math.round(ACTIVITIES[activityType].met * 3.5 * 60 / 200 * minutes);
    }

    async function apiFetch(url, options = {}) {
      const response = await fetch(url, { ...options, credentials: "same-origin" });
      if (response.status === 401) {
        await showLogin();
        throw new Error("请先登录");
      }
      return response;
    }

    function switchTab(tab) {
      document.querySelectorAll(".screen").forEach((screen) => screen.classList.remove("active"));
      document.querySelector(`#screen-${tab}`).classList.add("active");
      document.querySelectorAll(".tab-button").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === tab);
      });
    }

    function renderActivityButtons() {
      activityGrid.innerHTML = Object.entries(ACTIVITIES).map(([key, item]) => `
        <button class="activity-button" type="button" data-activity="${key}" aria-pressed="${key === selectedActivity}">
          ${item.icon}
          <span>${item.label}</span>
        </button>
      `).join("");
      activityGrid.querySelectorAll("button").forEach((item) => {
        item.addEventListener("click", () => selectActivity(item.dataset.activity));
      });
    }

    function selectActivity(activityType) {
      selectedActivity = activityType;
      const activity = ACTIVITIES[activityType];
      selectedActivityText.textContent = activity.label;
      $("#activityPreview").textContent = activity.label;
      stepsInput.value = activity.defaultSteps;
      durationInput.value = activity.defaultMinutes;
      strideInput.value = activity.stride;
      activityGrid.querySelectorAll("button").forEach((item) => {
        item.setAttribute("aria-pressed", String(item.dataset.activity === activityType));
      });
      refreshPreview();
    }

    function refreshPreview() {
      const steps = Number(stepsInput.value || 0);
      const stride = Number(strideInput.value || 0.7);
      const minutes = Number(durationInput.value || 0);
      $("#distancePreview").textContent = `${distanceKm(steps, stride).toFixed(2)} km`;
      $("#caloriePreview").textContent = `${calories(selectedActivity, minutes)} kcal`;
    }

    async function loadCaptcha() {
      loginMessage.textContent = "";
      captchaAnswerInput.value = "";
      const response = await fetch("/captcha", { credentials: "same-origin" });
      const payload = await response.json();
      captchaId = payload.captcha_id;
      captchaImage.innerHTML = "";
      const image = document.createElement("img");
      image.src = `${payload.image_url}?t=${Date.now()}`;
      image.alt = "安全验证码";
      captchaImage.appendChild(image);
    }

    async function showLogin() {
      currentUser = null;
      document.body.classList.remove("is-authed");
      document.body.classList.add("auth-needed");
      await loadCaptcha();
      setTimeout(() => loginNameInput.focus(), 50);
    }

    function hideLogin(user) {
      currentUser = user;
      $("#topUserName").textContent = user.name;
      document.body.classList.remove("auth-needed");
      document.body.classList.add("is-authed");
    }

    async function checkSession() {
      const response = await fetch("/me", { credentials: "same-origin" });
      if (!response.ok) {
        await showLogin();
        return;
      }
      const payload = await response.json();
      hideLogin(payload.user);
      await loadProfile();
      await loadStats();
    }

    function activityLabel(activityType) {
      return ACTIVITIES[activityType] ? ACTIVITIES[activityType].label : "运动";
    }

    function renderStats(stats) {
      $("#checkedInDays").textContent = `${stats.checked_in_days}/7`;
      $("#totalSteps").textContent = formatNumber.format(stats.total_steps);
      $("#totalKm").textContent = stats.total_distance_km.toFixed(1);
      $("#totalMinutes").textContent = `${stats.total_duration_minutes || 0}m`;
      $("#heroStreak").textContent = stats.streak_days;

      const today = localDateString(new Date());
      const todayRecord = stats.records.find((record) => record.date === today);
      const doneToday = Boolean(todayRecord && todayRecord.checked_in);
      $("#todayStatus").textContent = doneToday ? `今日已完成 ${activityLabel(todayRecord.activity_type)}` : "今日未完成";
      $("#todayStatus").classList.toggle("done", doneToday);
      $("#heroTitle").textContent = doneToday ? "保持节奏" : "今天动起来";
      $("#heroSteps").textContent = formatNumber.format(todayRecord ? todayRecord.steps : 0);
      $("#heroKm").textContent = `${(todayRecord ? todayRecord.distance_km : 0).toFixed(1)} km`;

      const maxScore = Math.max(1, ...stats.records.map((record) => Math.max(record.steps, record.duration_minutes * 150)));
      $("#weekList").innerHTML = stats.records.map((record) => {
        const date = new Date(`${record.date}T00:00:00`);
        const score = Math.max(record.steps, record.duration_minutes * 150);
        const percent = Math.min(100, Math.round(score / maxScore * 100));
        const doneClass = record.checked_in ? "done" : "";
        const todayClass = record.date === today ? "today" : "";
        const title = record.checked_in ? activityLabel(record.activity_type) : "休息";
        return `
          <article class="day ${doneClass} ${todayClass}">
            <div class="day-date">
              <strong>${weekday.format(date)}</strong>
              <span>${monthDay.format(date)}</span>
            </div>
            <div>
              <div class="day-title">
                <span class="activity-pill">${title}</span>
                <span class="${record.checked_in ? "" : "empty"}">${record.checked_in ? "已完成" : "未打卡"}</span>
              </div>
              <div class="bar" aria-hidden="true">
                <div class="bar-fill" style="width: ${percent}%"></div>
              </div>
            </div>
            <div class="day-numbers">
              <strong class="${record.steps ? "" : "empty"}">${record.steps ? `${formatNumber.format(record.steps)} 步` : "未记录"}</strong>
              <span>${record.distance_km ? `${record.distance_km.toFixed(2)} km` : "0 km"}</span>
              <span>${record.duration_minutes ? `${record.duration_minutes} min` : "0 min"}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    async function loadStats() {
      $("#todayDate").textContent = longDate.format(new Date());
      if (!currentUser) return;
      try {
        const response = await apiFetch("/stats?days=7");
        renderStats(await response.json());
      } catch (error) {
        if (error.message !== "请先登录") message.textContent = error.message;
      }
    }

    function applyProfile(profile) {
      $("#profileTitle").textContent = profile.name || currentUser.name;
      $("#profilePhone").textContent = profile.phone || currentUser.phone;
      $("#profileAvatar").textContent = (profile.name || "M").slice(0, 1).toUpperCase();
      $("#profileNameInput").value = profile.name || "";
      $("#profilePhoneInput").value = profile.phone || "";
      $("#heightInput").value = profile.height_cm || "";
      $("#weightInput").value = profile.weight_kg || "";
      $("#targetWeightInput").value = profile.target_weight_kg || "";
      $("#heightSummary").textContent = profile.height_cm ? `${profile.height_cm} cm` : "--";
      $("#weightSummary").textContent = profile.weight_kg ? `${profile.weight_kg} kg` : "--";
      $("#targetWeightSummary").textContent = profile.target_weight_kg ? `${profile.target_weight_kg} kg` : "--";
    }

    async function loadProfile() {
      const response = await apiFetch("/profile");
      const payload = await response.json();
      applyProfile(payload.profile);
    }

    document.querySelectorAll(".tab-button").forEach((button) => {
      button.addEventListener("click", () => switchTab(button.dataset.tab));
    });

    [stepsInput, durationInput, strideInput].forEach((input) => input.addEventListener("input", refreshPreview));

    $("#checkInForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      $("#submitButton").disabled = true;
      message.textContent = "";
      try {
        const durationMinutes = Number(durationInput.value || 0);
        const response = await apiFetch("/records/check-in", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            activity_type: selectedActivity,
            steps: Number(stepsInput.value || 0),
            duration_minutes: durationMinutes,
            stride_meters: Number(strideInput.value || 0.7),
            calories: calories(selectedActivity, durationMinutes),
            note: noteInput.value.trim() || null
          })
        });
        if (!response.ok) {
          const payload = await response.json();
          throw new Error(payload.error || "打卡失败");
        }
        await loadStats();
        switchTab("calendar");
      } catch (error) {
        if (error.message !== "请先登录") message.textContent = error.message;
      } finally {
        $("#submitButton").disabled = false;
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      $("#loginButton").disabled = true;
      loginMessage.textContent = "";
      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            name: loginNameInput.value.trim(),
            phone: loginPhoneInput.value.trim(),
            captcha_id: captchaId,
            captcha_answer: captchaAnswerInput.value.trim()
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "登录失败");
        hideLogin(payload.user);
        await loadProfile();
        await loadStats();
      } catch (error) {
        loginMessage.textContent = error.message;
        await loadCaptcha();
      } finally {
        $("#loginButton").disabled = false;
      }
    });

    $("#refreshCaptchaButton").addEventListener("click", loadCaptcha);

    profileForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      $("#profileSaveButton").disabled = true;
      $("#profileMessage").textContent = "";
      try {
        const response = await apiFetch("/profile", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            name: $("#profileNameInput").value.trim(),
            phone: $("#profilePhoneInput").value.trim(),
            height_cm: $("#heightInput").value,
            weight_kg: $("#weightInput").value,
            target_weight_kg: $("#targetWeightInput").value
          })
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.error || "保存失败");
        hideLogin(payload.user);
        applyProfile(payload.profile);
        $("#profileMessage").textContent = "已保存";
      } catch (error) {
        if (error.message !== "请先登录") $("#profileMessage").textContent = error.message;
      } finally {
        $("#profileSaveButton").disabled = false;
      }
    });

    $("#logoutButton").addEventListener("click", async () => {
      await fetch("/logout", { method: "POST", credentials: "same-origin" });
      await showLogin();
    });

    renderActivityButtons();
    refreshPreview();
    checkSession();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
