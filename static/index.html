<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#10251d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="动迹">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/icons/icon.svg">
  <title>动迹</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef3ef;
      --ink: #111815;
      --muted: #65736b;
      --subtle: #8a9890;
      --surface: #ffffff;
      --surface-soft: #f8faf7;
      --line: #dce5de;
      --green: #174d35;
      --lime: #d8fb58;
      --mint: #b8efd2;
      --blue: #76c8ee;
      --coral: #ef7d55;
      --gold: #f5c462;
      --shadow: 0 22px 50px rgba(28, 50, 39, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(180deg, #e7f0ea 0%, #f7f8f2 46%, #eef3ef 100%);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input {
      font: inherit;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1180px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--green);
      color: var(--lime);
      font-weight: 900;
      box-shadow: 0 12px 24px rgba(23, 77, 53, 0.2);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .date {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .streak {
      min-width: 82px;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      display: grid;
      place-items: center;
      padding: 6px 10px;
      text-align: center;
    }

    .streak strong {
      font-size: 18px;
      line-height: 1;
    }

    .streak span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .user-bar {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-chip {
      min-height: 44px;
      display: none;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.82);
      color: var(--green);
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
    }

    body.is-authed .user-chip {
      display: inline-flex;
    }

    .ghost-button {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #ffffff;
      color: var(--muted);
      padding: 0 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .hero {
      position: relative;
      min-height: 300px;
      overflow: hidden;
      display: grid;
      grid-template-columns: minmax(280px, 0.98fr) minmax(300px, 1.02fr);
      align-items: center;
      gap: 8px;
      border-radius: var(--radius);
      background:
        radial-gradient(circle at 80% 15%, rgba(216, 251, 88, 0.42), transparent 30%),
        linear-gradient(135deg, #10251d 0%, #174d35 58%, #24624a 100%);
      color: #ffffff;
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      max-width: 520px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 30px;
      border-radius: 999px;
      padding: 5px 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #d7efe2;
      font-size: 13px;
      font-weight: 800;
    }

    .status.done {
      background: rgba(216, 251, 88, 0.16);
      border-color: rgba(216, 251, 88, 0.4);
      color: var(--lime);
    }

    .hero h2 {
      max-width: 480px;
      margin-top: 18px;
      font-size: clamp(34px, 8vw, 72px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .hero p {
      max-width: 430px;
      margin-top: 14px;
      color: rgba(255, 255, 255, 0.74);
      line-height: 1.6;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 24px;
    }

    .hero-stat {
      min-height: 76px;
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.14);
      padding: 12px;
    }

    .hero-stat span {
      display: block;
      color: rgba(255, 255, 255, 0.62);
      font-size: 12px;
      font-weight: 800;
    }

    .hero-stat strong {
      display: block;
      margin-top: 8px;
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .hero-visual {
      position: relative;
      z-index: 1;
      width: min(100%, 520px);
      justify-self: end;
      filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.25));
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(300px, 0.88fr) minmax(360px, 1.12fr);
      gap: 18px;
      margin-top: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .panel h3 {
      font-size: 18px;
      letter-spacing: 0;
    }

    .panel-sub {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .activity-button {
      min-height: 82px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      color: var(--ink);
      cursor: pointer;
      display: grid;
      gap: 8px;
      place-items: center;
      padding: 10px 6px;
      font-weight: 900;
    }

    .activity-button svg {
      width: 24px;
      height: 24px;
      stroke-width: 2.4;
    }

    .activity-button[aria-pressed="true"] {
      background: #12281f;
      border-color: #12281f;
      color: #ffffff;
      box-shadow: 0 14px 28px rgba(23, 77, 53, 0.18);
    }

    .form {
      display: grid;
      gap: 12px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    input {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfdfb;
      color: var(--ink);
      padding: 11px 12px;
      outline: none;
    }

    input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(23, 77, 53, 0.12);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .preview {
      min-height: 76px;
      border-radius: var(--radius);
      background: #eff6ef;
      border: 1px solid #dbe9dc;
      padding: 12px;
    }

    .preview span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .preview strong {
      display: block;
      margin-top: 9px;
      font-size: 23px;
      line-height: 1;
    }

    .primary {
      min-height: 52px;
      border: 0;
      border-radius: var(--radius);
      background: #111815;
      color: #ffffff;
      font-weight: 900;
      cursor: pointer;
    }

    .primary:hover {
      background: #174d35;
    }

    .primary:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .message {
      min-height: 20px;
      color: #b85135;
      font-size: 13px;
      font-weight: 800;
    }

    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(16, 37, 29, 0.48);
      backdrop-filter: blur(12px);
    }

    body.auth-needed .login-overlay {
      display: flex;
    }

    body.auth-needed .app {
      filter: blur(5px);
      pointer-events: none;
      user-select: none;
    }

    .login-card {
      width: min(420px, 100%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 28px 80px rgba(17, 24, 21, 0.28);
      padding: 22px;
    }

    .login-card h2 {
      font-size: 28px;
      letter-spacing: 0;
    }

    .login-card p {
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    .login-form {
      display: grid;
      gap: 13px;
      margin-top: 18px;
    }

    .captcha-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: stretch;
    }

    .captcha-image {
      min-height: 70px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #f6faf5;
    }

    .captcha-image img {
      display: block;
      width: 100%;
      height: 70px;
      object-fit: cover;
    }

    .login-message {
      min-height: 20px;
      color: #b85135;
      font-size: 13px;
      font-weight: 900;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 13px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .metric strong {
      font-size: 24px;
      line-height: 1;
      overflow-wrap: anywhere;
    }

    .mix {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 16px;
    }

    .mix-card {
      min-height: 72px;
      border-radius: var(--radius);
      background: #f6f8f5;
      border: 1px solid var(--line);
      padding: 10px;
    }

    .mix-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .mix-card strong {
      display: block;
      margin-top: 8px;
      font-size: 20px;
    }

    .week {
      display: grid;
      gap: 10px;
    }

    .day {
      min-height: 76px;
      display: grid;
      grid-template-columns: 74px 1fr auto;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 12px;
    }

    .day.today {
      border-color: rgba(23, 77, 53, 0.28);
      background: #fbfffb;
    }

    .day-date strong {
      display: block;
      font-size: 15px;
    }

    .day-date span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .day-main {
      min-width: 0;
    }

    .day-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 900;
    }

    .activity-pill {
      min-height: 22px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #eef4ef;
      color: var(--green);
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 900;
    }

    .bar {
      height: 8px;
      margin-top: 10px;
      overflow: hidden;
      border-radius: 999px;
      background: #edf1ec;
    }

    .bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: var(--coral);
    }

    .day.done .bar-fill {
      background: var(--green);
    }

    .day-numbers {
      min-width: 118px;
      text-align: right;
      display: grid;
      gap: 4px;
    }

    .day-numbers strong {
      font-size: 16px;
    }

    .day-numbers span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .empty {
      color: var(--subtle);
    }

    @media (max-width: 900px) {
      .app {
        padding: 16px;
      }

      .hero,
      .layout {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: 0;
        padding: 20px;
      }

      .hero-visual {
        width: min(100%, 430px);
        justify-self: center;
      }

      .activity-grid,
      .metrics,
      .mix {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .topbar {
        align-items: flex-start;
      }

      .hero h2 {
        font-size: 38px;
        line-height: 1.05;
        white-space: nowrap;
      }

      .hero-stats,
      .field-row,
      .preview-grid {
        grid-template-columns: 1fr;
      }

      .day {
        grid-template-columns: 60px 1fr;
      }

      .day-numbers {
        grid-column: 1 / -1;
        min-width: 0;
        text-align: left;
        grid-template-columns: repeat(3, max-content);
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>动迹</h1>
          <p class="date" id="todayDate">--</p>
        </div>
      </div>
      <div class="user-bar">
        <div class="user-chip">
          <span id="userName">--</span>
          <button class="ghost-button" type="button" id="logoutButton">退出</button>
        </div>
        <div class="streak">
          <strong id="topStreak">0</strong>
          <span>连续天数</span>
        </div>
      </div>
    </header>

    <section class="hero">
      <div class="hero-copy">
        <div class="status" id="todayStatus">今日未完成</div>
        <h2 id="heroTitle">今天动起来</h2>
        <p id="heroCopy">散步、跑步、跳绳或游泳，把今天的一次运动留在记录里。</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <span>今日步数</span>
            <strong id="heroSteps">0</strong>
          </div>
          <div class="hero-stat">
            <span>今日距离</span>
            <strong id="heroKm">0.0 km</strong>
          </div>
          <div class="hero-stat">
            <span>今日时长</span>
            <strong id="heroMinutes">0 min</strong>
          </div>
        </div>
      </div>
      <img class="hero-visual" src="/assets/sport-hero.svg" alt="运动训练视觉">
    </section>

    <section class="layout">
      <section class="panel">
        <div class="panel-head">
          <h3>今日训练</h3>
          <span class="panel-sub" id="selectedActivityText">散步</span>
        </div>

        <div class="activity-grid" id="activityGrid"></div>

        <form class="form" id="checkInForm">
          <div class="field-row">
            <div class="field">
              <label for="stepsInput" id="stepsLabel">步数 / 次数</label>
              <input id="stepsInput" name="steps" type="number" min="0" step="1" inputmode="numeric" value="8000">
            </div>
            <div class="field">
              <label for="durationInput">运动时长</label>
              <input id="durationInput" name="duration" type="number" min="0" step="1" inputmode="numeric" value="45">
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label for="strideInput">步幅（米）</label>
              <input id="strideInput" name="stride" type="number" min="0.1" step="0.01" inputmode="decimal" value="0.7">
            </div>
            <div class="field">
              <label for="noteInput">备注</label>
              <input id="noteInput" name="note" type="text" maxlength="80" placeholder="晚饭后完成">
            </div>
          </div>

          <div class="preview-grid">
            <div class="preview">
              <span>预计距离</span>
              <strong id="distancePreview">5.60 km</strong>
            </div>
            <div class="preview">
              <span>预计消耗</span>
              <strong id="caloriePreview">165 kcal</strong>
            </div>
          </div>

          <button class="primary" type="submit" id="submitButton">完成今日训练</button>
          <p class="message" id="message"></p>
        </form>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>本周状态</h3>
          <span class="panel-sub">过去 7 天</span>
        </div>

        <div class="metrics">
          <div class="metric">
            <span>打卡</span>
            <strong id="checkedInDays">0/7</strong>
          </div>
          <div class="metric">
            <span>总步数</span>
            <strong id="totalSteps">0</strong>
          </div>
          <div class="metric">
            <span>总公里</span>
            <strong id="totalKm">0.0</strong>
          </div>
          <div class="metric">
            <span>总时长</span>
            <strong id="totalMinutes">0m</strong>
          </div>
        </div>

        <div class="mix" id="activityMix"></div>
        <div class="week" id="weekList"></div>
      </section>
    </section>
  </main>

  <section class="login-overlay" id="loginOverlay" aria-modal="true" role="dialog">
    <div class="login-card">
      <h2>登录动迹</h2>
      <p>输入姓名并完成安全图验证。</p>
      <form class="login-form" id="loginForm">
        <div class="field">
          <label for="loginNameInput">姓名</label>
          <input id="loginNameInput" name="name" type="text" maxlength="30" autocomplete="name" placeholder="请输入姓名">
        </div>
        <div class="field">
          <label for="captchaAnswerInput">安全图验证</label>
          <div class="captcha-row">
            <div class="captcha-image" id="captchaImage"></div>
            <button class="ghost-button" type="button" id="refreshCaptchaButton">换一张</button>
          </div>
          <input id="captchaAnswerInput" name="captcha" type="text" maxlength="8" autocomplete="off" inputmode="text" placeholder="输入图中字符">
        </div>
        <button class="primary" type="submit" id="loginButton">进入动迹</button>
        <p class="login-message" id="loginMessage"></p>
      </form>
    </div>
  </section>

  <script>
    const ACTIVITIES = {
      walk: {
        label: "散步",
        cue: "轻松走一段",
        defaultSteps: 8000,
        defaultMinutes: 45,
        stride: 0.7,
        met: 3.5,
        icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 20l2-5 4-2 1 7" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M8 10l4-3 4 2 2 4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="4" r="2" stroke="currentColor"/></svg>'
      },
      run: {
        label: "跑步",
        cue: "把心率拉起来",
        defaultSteps: 6500,
        defaultMinutes: 30,
        stride: 1.05,
        met: 8.3,
        icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M5 19h5l3-5 4 5h3" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M7 11l5-4 4 3-2 4" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 8h4M2 12h3" stroke="currentColor" stroke-linecap="round"/><circle cx="14" cy="4" r="2" stroke="currentColor"/></svg>'
      },
      rope: {
        label: "跳绳",
        cue: "短时高燃",
        defaultSteps: 0,
        defaultMinutes: 20,
        stride: 0.7,
        met: 10,
        icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 18c-3-3-3-9 0-12M17 18c3-3 3-9 0-12" stroke="currentColor" stroke-linecap="round"/><path d="M9 9l3 3 3-3M12 12v8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="8" cy="20" r="1.5" stroke="currentColor"/><circle cx="16" cy="20" r="1.5" stroke="currentColor"/></svg>'
      },
      swim: {
        label: "游泳",
        cue: "低冲击耐力",
        defaultSteps: 0,
        defaultMinutes: 40,
        stride: 0.7,
        met: 7,
        icon: '<svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 17c2 0 2-1 4-1s2 1 4 1 2-1 4-1 2 1 4 1 2-1 2-1" stroke="currentColor" stroke-linecap="round"/><path d="M6 12l5-3 4 3 4-1" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/><circle cx="13" cy="6" r="2" stroke="currentColor"/></svg>'
      }
    };

    const stepsInput = document.querySelector("#stepsInput");
    const durationInput = document.querySelector("#durationInput");
    const strideInput = document.querySelector("#strideInput");
    const noteInput = document.querySelector("#noteInput");
    const distancePreview = document.querySelector("#distancePreview");
    const caloriePreview = document.querySelector("#caloriePreview");
    const form = document.querySelector("#checkInForm");
    const button = document.querySelector("#submitButton");
    const message = document.querySelector("#message");
    const activityGrid = document.querySelector("#activityGrid");
    const selectedActivityText = document.querySelector("#selectedActivityText");
    const loginForm = document.querySelector("#loginForm");
    const loginNameInput = document.querySelector("#loginNameInput");
    const captchaAnswerInput = document.querySelector("#captchaAnswerInput");
    const captchaImage = document.querySelector("#captchaImage");
    const refreshCaptchaButton = document.querySelector("#refreshCaptchaButton");
    const loginButton = document.querySelector("#loginButton");
    const loginMessage = document.querySelector("#loginMessage");
    const logoutButton = document.querySelector("#logoutButton");
    const userName = document.querySelector("#userName");
    let selectedActivity = "walk";
    let currentUser = null;
    let captchaId = null;

    const formatNumber = new Intl.NumberFormat("zh-CN");
    const weekday = new Intl.DateTimeFormat("zh-CN", { weekday: "short" });
    const monthDay = new Intl.DateTimeFormat("zh-CN", { month: "2-digit", day: "2-digit" });
    const longDate = new Intl.DateTimeFormat("zh-CN", {
      month: "long",
      day: "numeric",
      weekday: "short"
    });

    function localDateString(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;
    }

    function distanceKm(steps, stride) {
      return steps * stride / 1000;
    }

    function calories(activityType, minutes) {
      const met = ACTIVITIES[activityType].met;
      return Math.round(met * 3.5 * 60 / 200 * minutes);
    }

    function renderActivityButtons() {
      activityGrid.innerHTML = Object.entries(ACTIVITIES).map(([key, item]) => `
        <button class="activity-button" type="button" data-activity="${key}" aria-pressed="${key === selectedActivity}">
          ${item.icon}
          <span>${item.label}</span>
        </button>
      `).join("");

      activityGrid.querySelectorAll("button").forEach((item) => {
        item.addEventListener("click", () => selectActivity(item.dataset.activity));
      });
    }

    function selectActivity(activityType) {
      selectedActivity = activityType;
      const activity = ACTIVITIES[activityType];
      selectedActivityText.textContent = activity.label;
      stepsInput.value = activity.defaultSteps;
      durationInput.value = activity.defaultMinutes;
      strideInput.value = activity.stride;
      document.querySelector("#heroCopy").textContent = activity.cue;
      activityGrid.querySelectorAll("button").forEach((item) => {
        item.setAttribute("aria-pressed", String(item.dataset.activity === activityType));
      });
      refreshPreview();
    }

    function refreshPreview() {
      const steps = Number(stepsInput.value || 0);
      const stride = Number(strideInput.value || 0.7);
      const minutes = Number(durationInput.value || 0);
      const km = distanceKm(steps, stride);
      distancePreview.textContent = `${km.toFixed(2)} km`;
      caloriePreview.textContent = `${calories(selectedActivity, minutes)} kcal`;
    }

    async function fetchStats() {
      const response = await fetch("/stats?days=7", { credentials: "same-origin" });
      if (response.status === 401) {
        await showLogin();
        throw new Error("请先登录");
      }
      if (!response.ok) {
        throw new Error("统计数据加载失败");
      }
      return response.json();
    }

    async function loadCaptcha() {
      loginMessage.textContent = "";
      captchaAnswerInput.value = "";
      const response = await fetch("/captcha", { credentials: "same-origin" });
      if (!response.ok) {
        loginMessage.textContent = "验证码加载失败";
        return;
      }
      const payload = await response.json();
      captchaId = payload.captcha_id;
      captchaImage.innerHTML = "";
      const image = document.createElement("img");
      image.src = `${payload.image_url}?t=${Date.now()}`;
      image.alt = "安全验证码";
      captchaImage.appendChild(image);
    }

    async function showLogin() {
      currentUser = null;
      document.body.classList.remove("is-authed");
      document.body.classList.add("auth-needed");
      await loadCaptcha();
      setTimeout(() => loginNameInput.focus(), 50);
    }

    function hideLogin(user) {
      currentUser = user;
      userName.textContent = user.name;
      document.body.classList.remove("auth-needed");
      document.body.classList.add("is-authed");
    }

    async function checkSession() {
      const response = await fetch("/me", { credentials: "same-origin" });
      if (!response.ok) {
        await showLogin();
        return;
      }
      const payload = await response.json();
      hideLogin(payload.user);
      await load();
    }

    function activityLabel(activityType) {
      return ACTIVITIES[activityType] ? ACTIVITIES[activityType].label : "运动";
    }

    function renderStats(stats) {
      document.querySelector("#checkedInDays").textContent = `${stats.checked_in_days}/7`;
      document.querySelector("#totalSteps").textContent = formatNumber.format(stats.total_steps);
      document.querySelector("#totalKm").textContent = stats.total_distance_km.toFixed(1);
      document.querySelector("#totalMinutes").textContent = `${stats.total_duration_minutes || 0}m`;
      document.querySelector("#topStreak").textContent = stats.streak_days;

      const today = localDateString(new Date());
      const todayRecord = stats.records.find((record) => record.date === today);
      const status = document.querySelector("#todayStatus");
      const doneToday = Boolean(todayRecord && todayRecord.checked_in);
      status.textContent = doneToday ? `今日已完成 ${activityLabel(todayRecord.activity_type)}` : "今日未完成";
      status.classList.toggle("done", doneToday);
      document.querySelector("#heroTitle").textContent = doneToday ? "保持节奏" : "今天动起来";
      document.querySelector("#heroSteps").textContent = formatNumber.format(todayRecord ? todayRecord.steps : 0);
      document.querySelector("#heroKm").textContent = `${(todayRecord ? todayRecord.distance_km : 0).toFixed(1)} km`;
      document.querySelector("#heroMinutes").textContent = `${todayRecord ? todayRecord.duration_minutes : 0} min`;

      document.querySelector("#activityMix").innerHTML = Object.entries(ACTIVITIES).map(([key, item]) => {
        const count = stats.activity_counts && stats.activity_counts[key] ? stats.activity_counts[key] : 0;
        return `
          <div class="mix-card">
            <span>${item.label}</span>
            <strong>${count}</strong>
          </div>
        `;
      }).join("");

      const maxScore = Math.max(
        1,
        ...stats.records.map((record) => Math.max(record.steps, record.duration_minutes * 150))
      );

      document.querySelector("#weekList").innerHTML = stats.records.map((record) => {
        const date = new Date(`${record.date}T00:00:00`);
        const score = Math.max(record.steps, record.duration_minutes * 150);
        const percent = Math.min(100, Math.round(score / maxScore * 100));
        const doneClass = record.checked_in ? "done" : "";
        const todayClass = record.date === today ? "today" : "";
        const title = record.checked_in ? activityLabel(record.activity_type) : "休息";
        const stepsText = record.steps > 0 ? `${formatNumber.format(record.steps)} 步` : "未记录";
        const kmText = record.distance_km > 0 ? `${record.distance_km.toFixed(2)} km` : "0 km";
        const minuteText = record.duration_minutes > 0 ? `${record.duration_minutes} min` : "0 min";

        return `
          <article class="day ${doneClass} ${todayClass}">
            <div class="day-date">
              <strong>${weekday.format(date)}</strong>
              <span>${monthDay.format(date)}</span>
            </div>
            <div class="day-main">
              <div class="day-title">
                <span class="activity-pill">${title}</span>
                <span class="${record.checked_in ? "" : "empty"}">${record.checked_in ? "已完成" : "未打卡"}</span>
              </div>
              <div class="bar" aria-hidden="true">
                <div class="bar-fill" style="width: ${percent}%"></div>
              </div>
            </div>
            <div class="day-numbers">
              <strong class="${record.steps ? "" : "empty"}">${stepsText}</strong>
              <span>${kmText}</span>
              <span>${minuteText}</span>
            </div>
          </article>
        `;
      }).join("");
    }

    async function load() {
      message.textContent = "";
      document.querySelector("#todayDate").textContent = longDate.format(new Date());
      if (!currentUser) {
        return;
      }
      try {
        renderStats(await fetchStats());
      } catch (error) {
        if (error.message !== "请先登录") {
          message.textContent = error.message;
        }
      }
    }

    stepsInput.addEventListener("input", refreshPreview);
    durationInput.addEventListener("input", refreshPreview);
    strideInput.addEventListener("input", refreshPreview);

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      button.disabled = true;
      message.textContent = "";

      const steps = Number(stepsInput.value || 0);
      const durationMinutes = Number(durationInput.value || 0);
      const stride = Number(strideInput.value || 0.7);

      try {
        const response = await fetch("/records/check-in", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            activity_type: selectedActivity,
            steps,
            duration_minutes: durationMinutes,
            stride_meters: stride,
            calories: calories(selectedActivity, durationMinutes),
            note: noteInput.value.trim() || null
          })
        });
        if (response.status === 401) {
          await showLogin();
          throw new Error("请先登录");
        }
        if (!response.ok) {
          const payload = await response.json();
          throw new Error(payload.error || "打卡失败");
        }
        await load();
      } catch (error) {
        message.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    });

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginButton.disabled = true;
      loginMessage.textContent = "";

      try {
        const response = await fetch("/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "same-origin",
          body: JSON.stringify({
            name: loginNameInput.value.trim(),
            captcha_id: captchaId,
            captcha_answer: captchaAnswerInput.value.trim()
          })
        });

        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "登录失败");
        }
        hideLogin(payload.user);
        await load();
      } catch (error) {
        loginMessage.textContent = error.message;
        await loadCaptcha();
      } finally {
        loginButton.disabled = false;
      }
    });

    refreshCaptchaButton.addEventListener("click", loadCaptcha);

    logoutButton.addEventListener("click", async () => {
      await fetch("/logout", {
        method: "POST",
        credentials: "same-origin"
      });
      await showLogin();
    });

    renderActivityButtons();
    refreshPreview();
    checkSession();

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
